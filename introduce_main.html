<!DOCTYPE html>
<html lang="ko" data-theme="light" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navigation Component with Tailwind - Fixed Tail Game</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            accent: 'var(--accent-color)',
          }
        }
      }
    }
  </script>
  
  <style>
    /* 1. 글로벌 테마 및 색상 변수 */
    :root, html[data-theme="light"] {
      --bg-color: #ffffff;
      --text-color: #333333;
      --nav-bg: rgba(255, 255, 255, 0.8);
      --accent-color: #4a90e2;
      --border-color: #dddddd;
      --card-bg: #f9f9f9;
    }
    html.dark, html[data-theme="dark"] {
      --bg-color: #121212;
      --text-color: #e0e0e0;
      --nav-bg: rgba(18, 18, 18, 0.8);
      --accent-color: #bb86fc;
      --border-color: #333333;
      --card-bg: #1e1e1e;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    
    /* 기본 마우스 커서 숨김 */
    html, body, a, button, input {
      cursor: none !important;
    }

    /* 배경 부유 파티클 애니메이션 */
    @keyframes floatUp {
      0% { transform: translateY(105vh) translateX(0) scale(1); opacity: 0; }
      50% { opacity: 0.5; }
      100% { transform: translateY(-10vh) translateX(50px) scale(1.2); opacity: 0; }
    }
    .animate-float {
      animation: floatUp 14s infinite linear;
    }
  </style>
</head>
<body class="min-h-[2000px] relative overflow-x-hidden select-none">

  <div class="fixed top-0 left-0 w-screen h-screen -z-10 pointer-events-none" id="particleContainer"></div>

  <div id="customCursor" class="fixed top-0 left-0 w-5 h-5 bg-accent rounded-full pointer-events-none z-[9999] -translate-x-1/2 -translate-y-1/2 mix-blend-difference scale-100 transition-transform duration-100 ease-out"></div>

  <nav class="fixed top-0 left-0 w-full z-50 backdrop-blur-md border-b" style="background-color: var(--nav-bg); border-color: var(--border-color);">
    <div class="w-full h-1 bg-transparent">
      <div id="progressBar" class="h-full w-0 bg-accent transition-all duration-75 ease-out"></div>
    </div>
    
    <div class="max-w-6xl mx-auto px-5 py-4 flex justify-between items-center">
      <a href="#" class="text-xl font-bold tracking-wider" style="color: var(--text-color);">PORTFOLIO</a>
      
      <button id="hamburgerBtn" class="flex flex-col gap-1.5 md:hidden focus:outline-none z-50">
        <span class="w-6 h-0.5 transition-all duration-300" style="background-color: var(--text-color);"></span>
        <span class="w-6 h-0.5 transition-all duration-300" style="background-color: var(--text-color);"></span>
        <span class="w-6 h-0.5 transition-all duration-300" style="background-color: var(--text-color);"></span>
      </button>

      <ul id="navMenu" class="hidden md:flex flex-col md:flex-row items-center gap-6 absolute md:static top-full left-0 w-full md:w-auto p-5 md:p-0 border-b md:border-none" style="background-color: var(--bg-color); border-color: var(--border-color);">
        <li class="nav-item active relative font-medium group"><a href="#about" class="hover:text-accent transition-colors block py-1" data-ko="나 자신" data-en="About Me">나 자신</a><span class="absolute bottom-0 left-0 w-0 h-0.5 bg-accent transition-all group-hover:w-full"></span></li>
        <li class="nav-item relative font-medium group"><a href="#portfolio" class="hover:text-accent transition-colors block py-1" data-ko="포트폴리오" data-en="Portfolio">포트폴리오</a><span class="absolute bottom-0 left-0 w-0 h-0.5 bg-accent transition-all group-hover:w-full"></span></li>
        <li class="nav-item relative font-medium group"><a href="#hobbies" class="hover:text-accent transition-colors block py-1" data-ko="취미" data-en="Hobbies">취미</a><span class="absolute bottom-0 left-0 w-0 h-0.5 bg-accent transition-all group-hover:w-full"></span></li>
        <li class="nav-item relative font-medium group"><a href="#contact" class="hover:text-accent transition-colors block py-1" data-ko="연락처" data-en="Contact">연락처</a><span class="absolute bottom-0 left-0 w-0 h-0.5 bg-accent transition-all group-hover:w-full"></span></li>
        
        <li class="flex gap-2.5 mt-4 md:mt-0 w-full md:w-auto justify-center">
          <button id="themeToggle" class="border px-3 py-1 rounded-full text-xs font-medium hover:bg-black/5 dark:hover:bg-white/5 transition-colors" style="border-color: var(--border-color); color: var(--text-color);">🌙 Dark</button>
          <button id="langToggle" class="border px-3 py-1 rounded-full text-xs font-medium hover:bg-black/5 dark:hover:bg-white/5 transition-colors" style="border-color: var(--border-color); color: var(--text-color);">EN</button>
        </li>
      </ul>
    </div>
  </nav>

  <main class="max-w-3xl mx-auto mt-32 px-5 py-12">
    <h1 id="mainTitle" class="text-4xl font-extrabold mb-4" data-ko="반갑습니다!" data-en="Welcome!">반갑습니다!</h1>
    <p class="text-base leading-relaxed opacity-80 mb-12">
      마우스를 움직여 화면에 떠다니는 파티클 주위로 다가가 보세요! 픽셀 거리 기반 충돌 감지가 작동하여 파티클이 즉시 수집되며, 마우스 커서 뒤로 최대 5개까지 뱀처럼 부드럽게 뒤따라오는 꼬리가 형성됩니다.
    </p>

    <section class="p-6 rounded-xl border" style="background-color: var(--card-bg); border-color: var(--border-color);">
      <h3 id="guestbookTitle" class="text-xl font-bold mb-4" data-ko="방명록" data-en="Guestbook">방명록</h3>
      <form id="guestbookForm" class="flex gap-3 mb-6">
        <input type="text" id="guestbookInput" class="flex-1 p-3 border rounded-lg focus:outline-none focus:border-accent" style="background-color: var(--bg-color); border-color: var(--border-color);" data-ko-placeholder="메시지를 남겨주세요" data-en-placeholder="Leave a message" placeholder="메시지를 남겨주세요" required>
        <button type="submit" id="guestbookBtn" class="px-6 py-3 bg-accent text-white font-medium rounded-lg hover:opacity-90 transition-opacity" data-ko="등록" data-en="Post">등록</button>
      </form>
      <ul id="guestbookList" class="divide-y" style="border-color: var(--border-color);"></ul>
    </section>
  </main>

  <script>
    // --- [초기화] Active 메뉴 표시 ---
    document.querySelectorAll('.nav-item.active a').forEach(el => el.classList.add('text-accent', 'font-bold'));
    document.querySelectorAll('.nav-item.active span').forEach(el => { el.classList.remove('w-0'); el.classList.add('w-full'); });

    // --- [1] 모바일 햄버거 메뉴 ---
    const hamburgerBtn = document.getElementById('hamburgerBtn');
    const navMenu = document.getElementById('navMenu');
    const spans = hamburgerBtn.querySelectorAll('span');

    hamburgerBtn.addEventListener('click', () => {
      navMenu.classList.toggle('hidden');
      navMenu.classList.toggle('flex');
      spans[0].classList.toggle('rotate-45'); spans[0].classList.toggle('translate-y-2');
      spans[1].classList.toggle('opacity-0');
      spans[2].classList.toggle('-rotate-45'); spans[2].classList.toggle('-translate-y-2');
    });

    // --- [2] 스크롤 진행률 ---
    window.addEventListener('scroll', () => {
      const winScroll = document.documentElement.scrollTop;
      const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
      const scrolled = height > 0 ? (winScroll / height) * 100 : 0;
      document.getElementById('progressBar').style.width = scrolled + '%';
    });

    // --- [3] 다크 모드 토글 ---
    const themeToggle = document.getElementById('themeToggle');
    const htmlElement = document.documentElement;

    function setTheme(theme) {
      if (theme === 'dark') {
        htmlElement.classList.add('dark');
        htmlElement.setAttribute('data-theme', 'dark');
        themeToggle.textContent = '☀️ Light';
      } else {
        htmlElement.classList.remove('dark');
        htmlElement.setAttribute('data-theme', 'light');
        themeToggle.textContent = '🌙 Dark';
      }
      localStorage.setItem('theme', theme);
    }
    setTheme(localStorage.getItem('theme') || 'light');
    themeToggle.addEventListener('click', () => setTheme(htmlElement.classList.contains('dark') ? 'light' : 'dark'));

    // --- [4] 다국어 토글 ---
    const langToggle = document.getElementById('langToggle');
    let currentLang = localStorage.getItem('lang') || 'ko';

    function applyLanguage(lang) {
      document.querySelectorAll('[data-ko]').forEach(el => el.textContent = el.getAttribute(`data-${lang}`));
      document.querySelectorAll('[data-ko-placeholder]').forEach(el => el.setAttribute('placeholder', el.getAttribute(`data-${lang}-placeholder`)));
      langToggle.textContent = lang === 'ko' ? 'EN' : 'KO';
    }
    applyLanguage(currentLang);
    langToggle.addEventListener('click', () => {
      currentLang = currentLang === 'ko' ? 'en' : 'ko';
      localStorage.setItem('lang', currentLang);
      applyLanguage(currentLang);
    });

    // --- [5] 커스텀 커서 & 기하학 기반 파티클 수집 엔진 시스템 ---
    const cursor = document.getElementById('customCursor');
    const particleContainer = document.getElementById('particleContainer');
    
    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    
    let activeParticles = [];   // 화면에서 둥둥 떠다니는 파티클 객체 정보
    let collectedParticles = []; // 커서 뒤에 잡혀서 장착된 꼬리 파티클 정보 (최대 5개)
    const maxTail = 5;
    const colors = ['#4a90e2', '#bb86fc', '#ff79c6', '#50fa7b', '#ffb86c', '#8be9fd', '#e11d48'];

    window.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      cursor.style.left = `${mouseX}px`;
      cursor.style.top = `${mouseY}px`;
    });

    // 버튼 호버 반응
    document.querySelectorAll('a, button, input').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('scale-150'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('scale-150'));
    });

    // 파티클 객체 생성 공급 장치
    function spawnParticle() {
      const el = document.createElement('div');
      const size = Math.random() * 12 + 12; // 직경 12px ~ 24px 변주
      const randomColor = colors[Math.floor(Math.random() * colors.length)];
      
      el.className = 'absolute rounded-full animate-float transition-opacity duration-300 pointer-events-none';
      el.style.width = `${size}px`;
      el.style.height = `${size}px`;
      el.style.backgroundColor = randomColor;
      
      // 화면 내 무작위 초기 배치
      const initialLeft = Math.random() * 95; 
      el.style.left = `${initialLeft}vw`;
      el.style.animationDelay = `${Math.random() * 3}s`;
      
      particleContainer.appendChild(el);

      const pObj = {
        element: el,
        color: randomColor,
        size: size,
        isCollected: false
      };
      activeParticles.push(pObj);

      // 자연 소멸 타이머 (14초 수명 주기 종료 후 제거 및 보충)
      setTimeout(() => {
        if (!pObj.isCollected && particleContainer.contains(el)) {
          el.remove();
          activeParticles = activeParticles.filter(p => p !== pObj);
          spawnParticle();
        }
      }, 14000);
    }

    // 초기 파티클 벌크 생성 (25개 포화 구성)
    for (let i = 0; i < 25; i++) { spawnParticle(); }

    // 고성능 60fps 추적 및 연쇄 거리 연산 물리 루프
    let tailPositions = Array(maxTail).fill({x: mouseX, y: mouseY});

    function physicsLoop() {
      // 1 단계 : 미수집 부유 파티클과 마우스 포인터 중심점 간의 거리 측정 (충돌 체크)
      activeParticles.forEach(p => {
        if (p.isCollected) return;

        // 화면 스크롤 좌표를 배제한 순수 뷰포트 상대 렉트 바인딩 획득
        const rect = p.element.getBoundingClientRect();
        const pCenterX = rect.left + (p.size / 2);
        const pCenterY = rect.top + (p.size / 2);

        // 마우스 중심점과의 유클리드 거리 산출
        const dist = Math.hypot(mouseX - pCenterX, mouseY - pCenterY);

        // 충돌 임계점(35px 반경 이내 진입 시 강제 흡착 워프 구동)
        if (dist < 35) {
          p.isCollected = true;
          p.element.classList.remove('animate-float');
          p.element.style.animation = 'none';
          p.element.style.opacity = '0.95';
          p.element.style.zIndex = '9998'; // 커서 정바닥 밑에 겹치도록 정렬

          // 꼬리 구조체 변환 장착
          collectedParticles.push({
            element: p.element,
            size: p.size * 0.75 // 꼬리 장착 시 컴팩트하게 축소
          });

          // 관리 큐 이탈 필터링
          activeParticles = activeParticles.filter(item => item !== p);

          // 5개 초과 시 최선두(가장 오래된) 꼬리 털어내고 신규 생성 보충
          if (collectedParticles.length > maxTail) {
            const old = collectedParticles.shift();
            old.element.remove();
          }
          
          // 수집 손실분 즉각 복구 분기 실행
          spawnParticle();
        }
      });

      // 2 단계 : 수집 완료된 꼬리 파티클들의 유연한 Lerp 관성 추적 물리 연산
      let targetX = mouseX;
      let targetY = mouseY;

      collectedParticles.forEach((part, index) => {
        let currentPos = tailPositions[index] || {x: targetX, y: targetY};
        
        const dx = targetX - currentPos.x;
        const dy = targetY - currentPos.y;
        
        // 보간 계수 0.23 적용 (마우스에 유연하고 쫀득하게 결착되어 따라오도록 텐션 조절)
        const nx = currentPos.x + dx * 0.23;
        const ny = currentPos.y + dy * 0.23;

        tailPositions[index] = {x: nx, y: ny};

        part.element.style.position = 'fixed';
        part.element.style.width = `${part.size}px`;
        part.element.style.height = `${part.size}px`;
        part.element.style.left = `${nx}px`;
        part.element.style.top = `${ny}px`;
        part.element.style.transform = `translate(-50%, -50%)`;

        // 선행 파티클 위치가 후행 파티클의 타겟이 되어 체인 형성
        targetX = nx;
        targetY = ny;
      });

      requestAnimationFrame(physicsLoop);
    }
    
    // 엔진 루프 시동
    requestAnimationFrame(physicsLoop);

    // --- [6] 간단한 방명록 ---
    const guestbookForm = document.getElementById('guestbookForm');
    const guestbookInput = document.getElementById('guestbookInput');
    const guestbookList = document.getElementById('guestbookList');
    let entries = JSON.parse(localStorage.getItem('guestbook_entries')) || [];

    function renderEntries() {
      guestbookList.innerHTML = '';
      entries.forEach(text => {
        const li = document.createElement('li');
        li.className = 'py-3 text-sm opacity-90';
        li.textContent = text;
        guestbookList.appendChild(li);
      });
    }

    guestbookForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const newText = guestbookInput.value.trim();
      if(newText) {
        entries.push(newText);
        localStorage.setItem('guestbook_entries', JSON.stringify(entries));
        renderEntries();
        guestbookInput.value = '';
      }
    });
    renderEntries();
  </script>
</body>
</html>
