<!DOCTYPE html>
<html lang="ko" data-theme="light" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>정인호 | 나 자신 - PORTFOLIO</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            accent: 'var(--accent-color)',
          }
        }
      }
    }
  </script>
  
  <style>
    :root, html[data-theme="light"] {
      --bg-color: #ffffff;
      --text-color: #333333;
      --nav-bg: rgba(255, 255, 255, 0.8);
      --accent-color: #0d9488; /* 정인호 메인 테마에 맞춘 딥민트 컬러 */
      --border-color: #dddddd;
      --card-bg: #f9f9f9;
    }
    html.dark, html[data-theme="dark"] {
      --bg-color: #121212;
      --text-color: #e0e0e0;
      --nav-bg: rgba(18, 18, 18, 0.8);
      --accent-color: #2dd4bf; 
      --border-color: #333333;
      --card-bg: #1e1e1e;
    }
    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    html, body, a, button, input {
      cursor: none !important;
    }
    @keyframes floatUp {
      0% { transform: translateY(105vh) translateX(0) scale(1); opacity: 0; }
      50% { opacity: 0.5; }
      100% { transform: translateY(-10vh) translateX(50px) scale(1.2); opacity: 0; }
    }
    .animate-float {
      animation: floatUp 14s infinite linear;
    }
  </style>
</head>
<body class="min-h-[1200px] relative overflow-x-hidden select-none">

  <div class="fixed top-0 left-0 w-screen h-screen -z-10 pointer-events-none" id="particleContainer"></div>
  <div id="customCursor" class="fixed top-0 left-0 w-5 h-5 bg-accent rounded-full pointer-events-none z-[9999] -translate-x-1/2 -translate-y-1/2 mix-blend-difference scale-100 transition-transform duration-100 ease-out"></div>

  <!-- Navigation -->

    <div class="w-full h-1 bg-transparent">
      <div id="progressBar" class="h-full w-0 bg-accent transition-all duration-75 ease-out"></div>
    </div>
    <div class="max-w-6xl mx-auto px-5 py-4 flex justify-between items-center">
      <a href="index.html" class="text-xl font-bold tracking-wider" style="color: var(--text-color);">PORTFOLIO</a>
      <button id="hamburgerBtn" class="flex flex-col gap-1.5 md:hidden focus:outline-none z-50">
        <span class="w-6 h-0.5 transition-all duration-300" style="background-color: var(--text-color);"></span>
        <span class="w-6 h-0.5 transition-all duration-300" style="background-color: var(--text-color);"></span>
        <span class="w-6 h-0.5 transition-all duration-300" style="background-color: var(--text-color);"></span>
      </button>
      <ul id="navMenu" class="hidden md:flex flex-col md:flex-row items-center gap-6 absolute md:static top-full left-0 w-full md:w-auto p-5 md:p-0 border-b md:border-none" style="background-color: var(--bg-color); border-color: var(--border-color);">
        <li class="nav-item relative font-medium group"><a href="index.html" class="hover:text-accent transition-colors block py-1" data-ko="나 자신" data-en="About Me">나 자신</a><span class="absolute bottom-0 left-0 w-0 h-0.5 bg-accent transition-all group-hover:w-full"></span></li>
        <li class="nav-item relative font-medium group"><a href="portfolio.html" class="hover:text-accent transition-colors block py-1" data-ko="포트폴리오" data-en="Portfolio">포트폴리오</a><span class="absolute bottom-0 left-0 w-0 h-0.5 bg-accent transition-all group-hover:w-full"></span></li>
        <li class="nav-item relative font-medium group"><a href="hobbies.html" class="hover:text-accent transition-colors block py-1" data-ko="취미 & 활동" data-en="Activities">취미 & 활동</a><span class="absolute bottom-0 left-0 w-0 h-0.5 bg-accent transition-all group-hover:w-full"></span></li>
        <li class="nav-item active relative font-medium group"><a href="contact.html" class="hover:text-accent transition-colors block py-1" data-ko="연락처" data-en="Contact">연락처</a><span class="absolute bottom-0 left-0 w-0 h-0.5 bg-accent transition-all group-hover:w-full"></span></li>
        <li class="flex gap-2.5 mt-4 md:mt-0 w-full md:w-auto justify-center">
          <button id="themeToggle" class="border px-3 py-1 rounded-full text-xs font-medium hover:bg-black/5 dark:hover:bg-white/5 transition-colors" style="border-color: var(--border-color); color: var(--text-color);">🌙 Dark</button>
          <button id="langToggle" class="border px-3 py-1 rounded-full text-xs font-medium hover:bg-black/5 dark:hover:bg-white/5 transition-colors" style="border-color: var(--border-color); color: var(--text-color);">EN</button>
        </li>
      </ul>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="max-w-3xl mx-auto mt-32 px-5 py-12">
    <h1 id="mainTitle" class="text-4xl font-extrabold mb-4" data-ko="✉️ 소통과 협업 제안" data-en="✉️ Get In Touch">✉️ 소통과 협업 제안</h1>
    <p class="text-base leading-relaxed opacity-80 mb-12" data-ko="함께 고민하고 성장할 준비가 되어 있습니다. 언제든 연락해 주세요!" data-en="Always ready to learn and develop together. Feel free to reach out."></p>

    <div class="p-6 rounded-xl border text-center space-y-6 mb-12" style="background-color: var(--card-bg); border-color: var(--border-color);">
      <div class="flex justify-center gap-6">
        <a href="https://github.com/Stamp-Ho" target="_blank" class="px-6 py-3 bg-accent text-white font-bold rounded-lg hover:opacity-90 transition-opacity">
          GitHub
        </a>
        <a href="mailto:inho8024s@gmail.com" class="px-6 py-3 border border-accent text-accent font-bold rounded-lg hover:bg-accent/5 transition-colors" style="border-color: var(--accent-color);">
          Email
        </a>
      </div>
    </div>

    <!-- 기존 2번 파일에 있던 모달 및 상호작용 데모 결합 인터페이스 -->
    <section class="p-6 rounded-xl border" style="background-color: var(--card-bg); border-color: var(--border-color);">
      <h3 class="text-xl font-bold mb-4" data-ko="✨ 퀵 채널 안내" data-en="✨ Quick Actions">✨ 퀵 채널 안내</h3>
      <div class="flex flex-wrap gap-3">
        <button onclick="alert('정인호는 프론트엔드 기반을 바탕으로 풀스택 역량을 확장하는 개발자입니다.')" class="px-4 py-2 bg-accent/10 text-accent text-sm font-semibold rounded-lg hover:bg-accent/25 transition-colors" data-ko="소개 요약" data-en="Intro Summary">소개 요약</button>
        <button onclick="alert('SSAFY에서는 실전형 학습으로 기술 공백을 줄이고, 조기 취업 가능한 수준의 실행력을 만들고자 합니다.')" class="px-4 py-2 bg-accent/10 text-accent text-sm font-semibold rounded-lg hover:bg-accent/25 transition-colors" data-ko="SSAFY 목표" data-en="SSAFY Goal">SSAFY 목표</button>
      </div>
    </section>
    <!-- Guestbook Engine -->
    <section class="p-6 mt-10 rounded-xl border" style="background-color: var(--card-bg); border-color: var(--border-color);">
      <h3 id="guestbookTitle" class="text-xl font-bold mb-4" data-ko="방명록" data-en="Guestbook">방명록</h3>
      <form id="guestbookForm" class="flex gap-3 mb-6">
        <input type="text" id="guestbookInput" class="flex-1 p-3 border rounded-lg focus:outline-none focus:border-accent" style="background-color: var(--bg-color); border-color: var(--border-color);" data-ko-placeholder="메시지를 남겨주세요" data-en-placeholder="Leave a message" placeholder="메시지를 남겨주세요" required>
        <button type="submit" id="guestbookBtn" class="px-6 py-3 bg-accent text-white font-medium rounded-lg hover:opacity-90 transition-opacity" data-ko="등록" data-en="Post">등록</button>
      </form>
      <ul id="guestbookList" class="divide-y" style="border-color: var(--border-color);"></ul>
    </section>
  </main>

<!-- 공통 스크립트 에셋 (모든 파일 동일 적용) -->
  <script>
    document.querySelectorAll('.nav-item.active a').forEach(el => el.classList.add('text-accent', 'font-bold'));
    document.querySelectorAll('.nav-item.active span').forEach(el => { el.classList.remove('w-0'); el.classList.add('w-full'); });

    const hamburgerBtn = document.getElementById('hamburgerBtn');
    const navMenu = document.getElementById('navMenu');
    const spans = hamburgerBtn.querySelectorAll('span');
    hamburgerBtn.addEventListener('click', () => {
      navMenu.classList.toggle('hidden'); navMenu.classList.toggle('flex');
      spans[0].classList.toggle('rotate-45'); spans[0].classList.toggle('translate-y-2');
      spans[1].classList.toggle('opacity-0');
      spans[2].classList.toggle('-rotate-45'); spans[2].classList.toggle('-translate-y-2');
    });

    window.addEventListener('scroll', () => {
      const winScroll = document.documentElement.scrollTop;
      const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
      const scrolled = height > 0 ? (winScroll / height) * 100 : 0;
      document.getElementById('progressBar').style.width = scrolled + '%';
    });

    const themeToggle = document.getElementById('themeToggle');
    const htmlElement = document.documentElement;
    function setTheme(theme) {
      if (theme === 'dark') {
        htmlElement.classList.add('dark'); htmlElement.setAttribute('data-theme', 'dark'); themeToggle.textContent = '☀️ Light';
      } else {
        htmlElement.classList.remove('dark'); htmlElement.setAttribute('data-theme', 'light'); themeToggle.textContent = '🌙 Dark';
      }
      localStorage.setItem('theme', theme);
    }
    setTheme(localStorage.getItem('theme') || 'light');
    themeToggle.addEventListener('click', () => setTheme(htmlElement.classList.contains('dark') ? 'light' : 'dark'));

    const langToggle = document.getElementById('langToggle');
    let currentLang = localStorage.getItem('lang') || 'ko';
    function applyLanguage(lang) {
      document.querySelectorAll('[data-ko]').forEach(el => el.textContent = el.getAttribute(`data-${lang}`));
      document.querySelectorAll('[data-ko-placeholder]').forEach(el => el.setAttribute('placeholder', el.getAttribute(`data-${lang}-placeholder`)));
      langToggle.textContent = lang === 'ko' ? 'EN' : 'KO';
    }
    applyLanguage(currentLang);
    langToggle.addEventListener('click', () => {
      currentLang = currentLang === 'ko' ? 'en' : 'ko'; localStorage.setItem('lang', currentLang); applyLanguage(currentLang);
    });

    const cursor = document.getElementById('customCursor');
    const particleContainer = document.getElementById('particleContainer');
    let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
    let activeParticles = [], collectedParticles = [];
    const maxTail = 5;
    const colors = ['#0d9488', '#2dd4bf', '#0f766e', '#14b8a6', '#ffb86c', '#8be9fd'];

    window.addEventListener('mousemove', (e) => {
      mouseX = e.clientX; mouseY = e.clientY;
      cursor.style.left = `${mouseX}px`; cursor.style.top = `${mouseY}px`;
    });
    document.querySelectorAll('a, button, input').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('scale-150'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('scale-150'));
    });

    function spawnParticle() {
      const el = document.createElement('div');
      const size = Math.random() * 12 + 12;
      const randomColor = colors[Math.floor(Math.random() * colors.length)];
      el.className = 'absolute rounded-full animate-float transition-opacity duration-300 pointer-events-none';
      el.style.width = `${size}px`; el.style.height = `${size}px`; el.style.backgroundColor = randomColor;
      el.style.left = `${Math.random() * 95}vw`; el.style.animationDelay = `${Math.random() * 3}s`;
      particleContainer.appendChild(el);
      const pObj = { element: el, color: randomColor, size: size, isCollected: false };
      activeParticles.push(pObj);
      setTimeout(() => {
        if (!pObj.isCollected && particleContainer.contains(el)) {
          el.remove(); activeParticles = activeParticles.filter(p => p !== pObj); spawnParticle();
        }
      }, 14000);
    }
    for (let i = 0; i < 25; i++) { spawnParticle(); }
    let tailPositions = Array(maxTail).fill({x: mouseX, y: mouseY});

    function physicsLoop() {
      activeParticles.forEach(p => {
        if (p.isCollected) return;
        const rect = p.element.getBoundingClientRect();
        const dist = Math.hypot(mouseX - (rect.left + p.size/2), mouseY - (rect.top + p.size/2));
        if (dist < 35) {
          p.isCollected = true; p.element.classList.remove('animate-float'); p.element.style.animation = 'none'; p.element.style.opacity = '0.95'; p.element.style.zIndex = '9998';
          collectedParticles.push({ element: p.element, size: p.size * 0.75 });
          activeParticles = activeParticles.filter(item => item !== p);
          if (collectedParticles.length > maxTail) { collectedParticles.shift().element.remove(); }
          spawnParticle();
        }
      });
      let targetX = mouseX, targetY = mouseY;
      collectedParticles.forEach((part, index) => {
        let currentPos = tailPositions[index] || {x: targetX, y: targetY};
        const nx = currentPos.x + (targetX - currentPos.x) * 0.23;
        const ny = currentPos.y + (targetY - currentPos.y) * 0.23;
        tailPositions[index] = {x: nx, y: ny};
        part.element.style.position = 'fixed'; part.element.style.width = `${part.size}px`; part.element.style.height = `${part.size}px`; part.element.style.left = `${nx}px`; part.element.style.top = `${ny}px`; part.element.style.transform = `translate(-50%, -50%)`;
        targetX = nx; targetY = ny;
      });
      requestAnimationFrame(physicsLoop);
    }
    requestAnimationFrame(physicsLoop);

    const guestbookForm = document.getElementById('guestbookForm');
    const guestbookInput = document.getElementById('guestbookInput');
    const guestbookList = document.getElementById('guestbookList');
    let entries = JSON.parse(localStorage.getItem('guestbook_entries_inho')) || [];
    function renderEntries() {
      guestbookList.innerHTML = '';
      entries.forEach(text => {
        const li = document.createElement('li'); li.className = 'py-3 text-sm opacity-90'; li.textContent = text; guestbookList.appendChild(li);
      });
    }
    guestbookForm.addEventListener('submit', (e) => {
      e.preventDefault(); const newText = guestbookInput.value.trim();
      if(newText) { entries.push(newText); localStorage.setItem('guestbook_entries_inho', JSON.stringify(entries)); renderEntries(); guestbookInput.value = ''; }
    });
    renderEntries();
  </script>
</body>
</html>
